data_dir: data

corpus:
  families:
    - entanglement
  max_qubits: 5
  qubit_counts: [3, 5]
  seed: 42

zx:
  reduction: full_reduce
  normalize: true

mining:
  min_support: 2
  min_vertices: 2
  max_vertices: 6
  phase_discretization: 8
  include_phase_in_label: true

compose:
  max_webs_per_candidate: 2
  max_candidates: 20
  composition_modes: [sequential, parallel]
  boundary_match_strategy: exact_type
  seed: 42

filter:
  extract_timeout_seconds: 10.0
  max_cnot_blowup_factor: 5.0
  dedup_method: unitary

bench:
  tasks:
    - ghz
  qasmbench_path: data/qasmbench
  fidelity_shots: 4096

report:
  output_format: [json, html]
  figure_dpi: 150
